<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薯光卡密后台管理</title>
  <meta name="description" content="账号自动卡密下单系统后台静态管理端">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/css/admin.css" rel="stylesheet">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <a class="admin-brand" href="admin.html">
        <span class="admin-brand-mark">S</span>
        <span>
          <small>Auto Account</small>
          <strong>薯光后台</strong>
        </span>
      </a>
      <nav class="admin-menu" id="adminMenu"></nav>
    </aside>

    <div class="admin-workspace">
      <header class="admin-topbar">
        <button class="sidebar-toggle" id="sidebarToggleBtn" type="button" aria-label="切换菜单">
          <i class="bi bi-list"></i>
        </button>
        <div>
          <p class="admin-breadcrumb mb-1" id="adminBreadcrumb">后台管理 / 商品管理</p>
          <h1 id="adminPageTitle">商品列表</h1>
        </div>
        <div class="admin-user-chip">
          <i class="bi bi-person-badge"></i>
          <span>演示管理员</span>
        </div>
      </header>

      <main class="admin-main">
        <section class="admin-overview" id="adminOverview"></section>

        <section class="admin-card search-card">
          <div class="admin-section-head">
            <div>
              <span class="admin-kicker">Search</span>
              <h2>搜索区</h2>
            </div>
            <button class="btn btn-light admin-btn" id="resetSearchBtn" type="button">
              <i class="bi bi-arrow-counterclockwise"></i>
              重置
            </button>
          </div>
          <form class="admin-search-grid" id="adminSearchForm"></form>
        </section>

        <section class="admin-card list-card">
          <div class="admin-section-head">
            <div>
              <span class="admin-kicker">Table</span>
              <h2>列表区</h2>
            </div>
            <div class="admin-toolbar" id="adminToolbar"></div>
          </div>
          <div class="admin-table-wrap" id="adminTableWrap"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal fade admin-modal" id="adminFormModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <span class="admin-kicker" id="adminFormKicker">Form</span>
            <h3 class="modal-title" id="adminFormTitle">新增</h3>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="adminEntityForm">
          <div class="modal-body">
            <div class="admin-form-grid" id="adminFormBody"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light admin-btn" data-bs-dismiss="modal">取消</button>
            <button type="submit" class="btn btn-dark admin-btn">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade admin-modal" id="adminDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <span class="admin-kicker">Detail</span>
            <h3 class="modal-title" id="adminDetailTitle">详情</h3>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="adminDetailBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/admin-data.js?v=2026052801"></script>
  <script src="components/admin-components.js?v=2026052801"></script>
  <script src="assets/js/admin.js?v=2026052801"></script>
</body>
</html>
