<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薯光卡密 - 24小时自动发号</title>
  <meta name="description" content="小红薯账号24小时自动卡密下单系统前台演示">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="home">
  <div class="app-shell">
    <header class="site-header">
      <div class="container py-3 py-lg-4">
        <nav class="topbar glass-panel">
          <a class="brand" href="index.html">
            <span class="brand-mark">S</span>
            <div>
              <p class="brand-kicker mb-0">24小时自动发号</p>
              <h1 class="brand-title mb-0">薯光卡密</h1>
            </div>
          </a>
          <div class="header-actions d-none d-md-flex">
            <a class="nav-chip active" href="index.html">首页</a>
            <a class="nav-chip" href="orders.html">订单</a>
            <a class="nav-chip" href="profile.html">我的</a>
            <div class="header-auth-slot" data-auth-slot></div>
          </div>
        </nav>
      </div>
    </header>

    <main class="pb-mobile-nav">
      <section class="hero-section">
        <div class="container">
          <div class="hero-card" data-aos="fade-up">
            <div class="hero-copy">
              <span class="eyebrow">自动交付 · 免登录下单 · 即拍即发</span>
              <h2>小红薯账号卡密前台，全天候稳定发号</h2>
              <p>支持商品上架、公告展示、商品详情、前台免登录下单与本地下单记录演示，界面为移动端与桌面端同步优化。</p>
              <div class="hero-actions">
                <a class="btn btn-dark btn-pill" href="#product-section">立即选购</a>
                <a class="btn btn-light btn-pill btn-outline-soft" href="orders.html">查看订单</a>
              </div>
            </div>
            <div class="hero-metrics">
              <div class="metric-card">
                <span class="metric-label">在线商品</span>
                <strong class="metric-value" id="heroProductCount">0</strong>
              </div>
              <div class="metric-card">
                <span class="metric-label">自动发货</span>
                <strong class="metric-value">24h</strong>
              </div>
              <div class="metric-card">
                <span class="metric-label">下单方式</span>
                <strong class="metric-value">免登录</strong>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="container mt-4 mt-lg-5">
        <div class="notice-strip glass-panel" data-aos="fade-up" data-aos-delay="50">
          <div class="section-label">
            <i class="bi bi-megaphone"></i>
            网站公告
          </div>
          <div class="notice-content" id="noticeList"></div>
        </div>
      </section>

      <section class="container mt-4 mt-lg-5" id="product-section">
        <div class="section-heading section-heading-home" data-aos="fade-up" data-aos-delay="80">
          <div>
            <span class="section-kicker">精选商品</span>
            <h3>支持按受众属性快速筛选</h3>
          </div>
          <div class="quick-filter-toolbar">
            <div class="quick-filter-scroll" id="categoryFilters"></div>
            <button
              class="filter-pill filter-launcher"
              id="openFilterDrawerBtn"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#advancedFilterDrawer"
              aria-controls="advancedFilterDrawer"
            >
              <i class="bi bi-sliders"></i>
              <span>筛选</span>
              <span class="filter-count-badge hidden" id="filterBadgeCount">0</span>
            </button>
          </div>
        </div>

        <div class="active-filter-row" id="activeFilterSummary"></div>

        <div class="section-meta-row" data-aos="fade-up" data-aos-delay="90">
          <p class="section-copy section-copy-inline">筛选是可选项，不使用时默认展示全部商品。你也可以直接浏览商品后再决定是否缩小范围。</p>
          <div class="result-meta">
            <span class="result-badge">匹配商品</span>
            <strong id="productResultCount">0</strong>
          </div>
        </div>
        <div class="product-grid" id="productGrid"></div>
      </section>
    </main>

    <div class="offcanvas offcanvas-end filter-drawer" tabindex="-1" id="advancedFilterDrawer" aria-labelledby="advancedFilterDrawerLabel">
      <div class="offcanvas-header">
        <div>
          <span class="section-kicker">Advanced Filter</span>
          <h4 class="offcanvas-title" id="advancedFilterDrawerLabel">筛选条件</h4>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <p class="drawer-helper-text">这些条件全部都是可选的，不设置时默认展示全部商品。</p>
        <form id="advancedFilterForm" class="drawer-filter-form">
          <div class="mb-3">
            <label class="form-label" for="drawerSortSelect">排序方式</label>
            <select class="form-select" id="drawerSortSelect" name="sort">
              <option value="default">默认排序</option>
              <option value="price_desc">价格降序</option>
              <option value="price_asc">价格升序</option>
              <option value="fans_desc">粉丝降序</option>
              <option value="fans_asc">粉丝升序</option>
              <option value="likes_desc">收藏降序</option>
              <option value="likes_asc">收藏升序</option>
            </select>
          </div>

          <div class="drawer-inline-grid">
            <div>
              <label class="form-label" for="drawerMinPriceInput">最低价格</label>
              <input class="form-control" id="drawerMinPriceInput" name="minPrice" type="number" min="0" placeholder="例如 100">
            </div>
            <div>
              <label class="form-label" for="drawerMaxPriceInput">最高价格</label>
              <input class="form-control" id="drawerMaxPriceInput" name="maxPrice" type="number" min="0" placeholder="例如 500">
            </div>
          </div>

          <div class="mb-3 mt-3">
            <label class="form-label" for="drawerPlatformSelect">账号分类</label>
            <select class="form-select" id="drawerPlatformSelect" name="platform">
              <option value="全部">全部平台</option>
              <option value="某音">某音</option>
              <option value="某手">某手</option>
              <option value="某视频号">某视频号</option>
              <option value="某红薯">某红薯</option>
              <option value="某百家号">某百家号</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label" for="drawerAudienceSelect">受众偏好</label>
            <select class="form-select" id="drawerAudienceSelect" name="category">
              <option value="全部">全部偏好</option>
              <option value="女粉优势">女粉优势</option>
              <option value="男粉优势">男粉优势</option>
              <option value="实名账号">实名账号</option>
              <option value="高收藏">高收藏</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label" for="drawerCertificationSelect">实名状态</label>
            <select class="form-select" id="drawerCertificationSelect" name="certification">
              <option value="all">全部状态</option>
              <option value="certified">已实名</option>
              <option value="uncertified">未实名</option>
              <option value="custom">可自定义实名</option>
            </select>
          </div>

          <div class="drawer-actions">
            <button class="btn btn-light btn-pill btn-outline-soft" id="drawerResetFiltersBtn" type="button">重置</button>
            <button class="btn btn-dark btn-pill" type="submit">应用筛选</button>
          </div>
        </form>
      </div>
    </div>

    <nav class="mobile-tabbar">
      <a class="tabbar-item active" href="index.html">
        <i class="bi bi-house-door"></i>
        <span>首页</span>
      </a>
      <a class="tabbar-item" href="orders.html">
        <i class="bi bi-receipt"></i>
        <span>订单</span>
      </a>
      <a class="tabbar-item" href="profile.html">
        <i class="bi bi-person"></i>
        <span>我的</span>
      </a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
