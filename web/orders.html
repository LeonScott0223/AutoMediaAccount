<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单中心 - 薯光卡密</title>
  <meta name="description" content="前端订单记录与卡密展示">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="orders">
  <div class="app-shell">
    <header class="site-header inner-header">
      <div class="container py-3 py-lg-4">
        <nav class="topbar glass-panel">
          <a class="brand" href="index.html">
            <span class="brand-mark">S</span>
            <div>
              <p class="brand-kicker mb-0">本地订单演示</p>
              <h1 class="brand-title mb-0">订单中心</h1>
            </div>
          </a>
          <div class="header-actions d-none d-md-flex">
            <a class="nav-chip" href="index.html">首页</a>
            <a class="nav-chip active" href="orders.html">订单</a>
            <a class="nav-chip" href="profile.html">我的</a>
            <div class="header-auth-slot" data-auth-slot></div>
          </div>
        </nav>
      </div>
    </header>

    <main class="container pb-mobile-nav">
      <section class="page-hero compact-hero" data-aos="fade-up">
        <div>
          <span class="section-kicker">Order Center</span>
          <h2>免登录下单记录</h2>
          <p>展示真实演示订单与静态样单，便于联调支付、订单详情和自动发号后的信息结构。</p>
        </div>
        <button class="btn btn-light btn-pill btn-outline-soft" id="clearOrdersBtn">
          <i class="bi bi-trash3 me-2"></i>清空本地订单
        </button>
      </section>

      <section class="stats-row" id="orderStats" data-aos="fade-up" data-aos-delay="50"></section>

      <section class="orders-board mt-4">
        <div class="orders-section" data-aos="fade-up">
          <div class="section-heading section-heading-compact">
            <div>
              <span class="section-kicker">Paid Orders</span>
              <h3>我的支付订单</h3>
            </div>
          </div>
          <div id="ordersList" class="orders-list"></div>
        </div>

        <div class="orders-section mt-4" data-aos="fade-up" data-aos-delay="70">
          <div class="section-heading section-heading-compact">
            <div>
              <span class="section-kicker">Demo Orders</span>
              <h3>静态展示样单</h3>
            </div>
            <p class="section-copy">用于展示订单详情结构、支付方式、自动发号信息和售后说明。</p>
          </div>
          <div id="demoOrdersList" class="orders-list"></div>
        </div>
      </section>
    </main>

    <nav class="mobile-tabbar">
      <a class="tabbar-item" href="index.html">
        <i class="bi bi-house-door"></i>
        <span>首页</span>
      </a>
      <a class="tabbar-item active" href="orders.html">
        <i class="bi bi-receipt"></i>
        <span>订单</span>
      </a>
      <a class="tabbar-item" href="profile.html">
        <i class="bi bi-person"></i>
        <span>我的</span>
      </a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
