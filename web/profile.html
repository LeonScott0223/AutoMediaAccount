<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 - 薯光卡密</title>
  <meta name="description" content="我的页面与平台信息展示">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body data-page="profile">
  <div class="app-shell">
    <header class="site-header inner-header">
      <div class="container py-3 py-lg-4">
        <nav class="topbar glass-panel">
          <a class="brand" href="index.html">
            <span class="brand-mark">S</span>
            <div>
              <p class="brand-kicker mb-0">个人中心</p>
              <h1 class="brand-title mb-0">我的</h1>
            </div>
          </a>
          <div class="header-actions d-none d-md-flex">
            <a class="nav-chip" href="index.html">首页</a>
            <a class="nav-chip" href="orders.html">订单</a>
            <a class="nav-chip active" href="profile.html">我的</a>
            <div class="header-auth-slot" data-auth-slot></div>
          </div>
        </nav>
      </div>
    </header>

    <main class="container pb-mobile-nav">
      <section class="profile-hero" data-aos="fade-up">
        <div class="profile-card glass-panel">
          <div class="profile-avatar">
            <span id="profileAvatarText">SG</span>
          </div>
          <div class="profile-copy">
            <span class="section-kicker">Seller Workspace</span>
            <h2 id="profileWelcomeName">前台演示账户</h2>
            <p id="profileWelcomeText">当前页面用于展示平台信息、下单说明和售后提示，后续可直接替换为真实用户中心接口。</p>
          </div>
          <div class="profile-hero-actions">
            <a class="btn btn-dark btn-pill" href="orders.html">查看订单</a>
            <button class="btn btn-light btn-pill btn-outline-soft" id="logoutBtn" type="button">退出登录</button>
          </div>
        </div>
      </section>

      <section class="profile-stats-grid mt-4" id="profileStats" data-aos="fade-up" data-aos-delay="40"></section>

      <section class="profile-grid mt-4">
        <div class="profile-panel" data-aos="fade-up" data-aos-delay="40">
          <h3>账户信息</h3>
          <div class="profile-info-list" id="profileInfoList"></div>
        </div>
        <div class="profile-panel" data-aos="fade-up" data-aos-delay="80">
          <h3>最近订单概览</h3>
          <div class="recent-orders-list" id="profileRecentOrders"></div>
        </div>
        <div class="profile-panel" data-aos="fade-up" data-aos-delay="120">
          <h3>服务状态</h3>
          <div class="contact-box">
            <p><i class="bi bi-chat-square-text me-2"></i>售前咨询：09:00 - 24:00</p>
            <p><i class="bi bi-clock-history me-2"></i>自动发货：7 x 24 小时</p>
            <p><i class="bi bi-credit-card me-2"></i>支付方式：微信 / 支付宝 / QQ 支付</p>
            <p><i class="bi bi-exclamation-circle me-2"></i>卡密类商品一经交付，请及时保存。</p>
          </div>
        </div>
      </section>
    </main>

    <nav class="mobile-tabbar">
      <a class="tabbar-item" href="index.html">
        <i class="bi bi-house-door"></i>
        <span>首页</span>
      </a>
      <a class="tabbar-item" href="orders.html">
        <i class="bi bi-receipt"></i>
        <span>订单</span>
      </a>
      <a class="tabbar-item active" href="profile.html">
        <i class="bi bi-person"></i>
        <span>我的</span>
      </a>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
